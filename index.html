<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="manifest" href="./site.webmanifest">
<meta name="msapplication-TileColor" content="#5865F2">
<meta name="theme-color" content="#0e1015">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elancag — Discord Bot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080b11;
  --ink:      #0c1018;
  --panel:    #111620;
  --rim:      #1e2840;
  --blurple:  #5865F2;
  --blurple-h:#6d79ff;
  --glow:     rgba(88,101,242,.35);
  --text:     #dde4f0;
  --muted:    #5a6680;
  --accent:   #57F287;
  --mono:     'Inconsolata', monospace;
  --sans:     'Syne', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* ── Canvas bg ─────────────────────────────────────── */
#cvs {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: .55;
}

/* ── Noise overlay ─────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .025;
}

/* ── Main wrap ─────────────────────────────────────── */
.wrap {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
}

/* ── Tag line ──────────────────────────────────────── */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--rim);
  background: var(--panel);
  padding: 5px 14px;
  border-radius: 40px;
  margin-bottom: 40px;
  opacity: 0;
  animation: rise .6s .1s ease forwards;
}

.tag .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .4; }
}

/* ── Hero name ─────────────────────────────────────── */
.hero-name {
  font-size: clamp(64px, 13vw, 128px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -.03em;
  text-align: center;
  margin-bottom: 28px;
  padding: 0 16px 12px;
  opacity: 0;
  animation: rise .7s .2s ease forwards;
  position: relative;
  overflow: visible;
}

.hero-name .letter {
  display: inline-block;
  background: linear-gradient(160deg, #ffffff 30%, #8891c8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: transform .2s ease;
  padding-bottom: 6px;
}

.hero-name .letter:hover {
  transform: translateY(-6px) scale(1.05);
}

/* ── Subtitle ──────────────────────────────────────── */
.subtitle {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--muted);
  text-align: center;
  max-width: 420px;
  line-height: 1.7;
  margin-bottom: 56px;
  opacity: 0;
  animation: rise .7s .35s ease forwards;
}

.subtitle em {
  font-style: normal;
  color: #7d89cc;
}

/* ── CTA buttons ───────────────────────────────────── */
.cta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  animation: rise .7s .5s ease forwards;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  padding: 15px 32px;
  border-radius: 12px;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
  position: relative;
  overflow: hidden;
  letter-spacing: .01em;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 50%);
  pointer-events: none;
}

.btn:active { transform: scale(.97); }

/* Primary — add to server */
.btn-primary {
  background: var(--blurple);
  color: #fff;
  box-shadow: 0 0 0 0 var(--glow), 0 4px 20px rgba(88,101,242,.3);
}

.btn-primary:hover {
  background: var(--blurple-h);
  transform: translateY(-2px);
  box-shadow: 0 0 0 6px rgba(88,101,242,.12), 0 8px 32px rgba(88,101,242,.45);
}

.btn-primary.disabled {
  opacity: .38;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
}

/* Secondary — docs */
.btn-secondary {
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--rim);
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}

.btn-secondary:hover {
  background: var(--rim);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(0,0,0,.4);
  border-color: #2f3e5e;
}

.btn-icon {
  font-size: 18px;
  line-height: 1;
}

/* Tooltip on disabled */
.btn-wrap {
  position: relative;
}

.tooltip {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: var(--panel);
  border: 1px solid var(--rim);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  z-index: 10;
}

.tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--rim);
}

.btn-wrap:hover .tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Features strip ────────────────────────────────── */
.features {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 72px;
  opacity: 0;
  animation: rise .7s .65s ease forwards;
}

.feat {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--panel);
  border: 1px solid var(--rim);
  border-radius: 30px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
  transition: border-color .2s, color .2s;
}

.feat:hover {
  border-color: #3a4f78;
  color: #8899bb;
}

.feat .fi { font-size: 15px; }

/* ── Footer ────────────────────────────────────────── */
.foot {
  margin-top: 80px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  letter-spacing: .06em;
  opacity: 0;
  animation: rise .6s .8s ease forwards;
}

/* ── Animations ────────────────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Discord server corner btn ─────────────────────── */
.discord-corner {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  opacity: 0;
  animation: rise .5s .9s ease forwards;
}

.discord-corner a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  background: var(--panel);
  border: 1px solid var(--rim);
  border-radius: 12px;
  text-decoration: none;
  transition: background .18s, border-color .18s, transform .18s, box-shadow .18s;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}

.discord-corner a:hover {
  background: var(--blurple);
  border-color: var(--blurple);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(88,101,242,.45);
}

.discord-corner svg {
  width: 22px;
  height: 22px;
  fill: var(--muted);
  transition: fill .18s;
}

.discord-corner a:hover svg {
  fill: #fff;
}

/* ── Responsive ────────────────────────────────────── */
@media (max-width: 480px) {
  .cta { flex-direction: column; align-items: center; }
  .btn { width: 100%; justify-content: center; }
  .features { gap: 8px; }
  .discord-corner { top: 14px; right: 14px; }
}
</style>
</head>
<body>

<canvas id="cvs"></canvas>

<div class="discord-corner">
  <a href="#" title="Официальный сервер Elancag" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
    </svg>
  </a>
</div>

<div class="wrap">

  <div class="tag">
    <span class="dot"></span>
    Discord Bot · v2.7.1
  </div>

  <h1 class="hero-name" id="heroName"></h1>

  <p class="subtitle">
    Голосовые утилиты, каналы-статусники<br>
    и управление сервером —<br>
    <em>всё в одной команде.</em>
  </p>

  <div class="cta">
    <div class="btn-wrap">
      <div class="tooltip">Скоро будет доступно</div>
      <a class="btn btn-primary disabled" aria-disabled="true">
        <span class="btn-icon">＋</span>
        Добавить на сервер
      </a>
    </div>

    <a class="btn btn-secondary" href="https://kk313.github.io/ElancagDocs/docs">
      <span class="btn-icon">📖</span>
      Документация
    </a>

    <a class="btn btn-secondary" href="https://kk313.github.io/ElancagDocs/roadmap">
      <span class="btn-icon">🗺️</span>
      Roadmap
    </a>
  </div>

  <div class="features">
    <div class="feat"><span class="fi">🌍</span> Смена регионов</div>
    <div class="feat"><span class="fi">⚡</span> Slash-команды</div>
    <div class="feat"><span class="fi">🛡️</span> Гибкие права</div>
    <div class="feat"><span class="fi">🔌</span> Рубильник фич</div>
  </div>

  <div class="foot">
    ELANCAG &nbsp;·&nbsp; made with ♥ for Discord
  </div>

</div>

<script>
/* ── Animated name ─────────────────────────────── */
const NAMES = [
  { text: 'Elancag',          weight: 1000 },
  { text: 'ГОООООЛ', 		weight: 1 },
  { text: 'Насрано',           weight: 1 },
];

function pickName() {
  const total = NAMES.reduce((s, n) => s + n.weight, 0);
  let r = Math.random() * total;
  for (const n of NAMES) { r -= n.weight; if (r <= 0) return n.text; }
  return NAMES[0].text;
}

const chosenName = pickName();
const container = document.getElementById('heroName');
chosenName.split('').forEach((ch, i) => {
  const span = document.createElement('span');
  span.className = 'letter';
  span.textContent = ch === ' ' ? ' ' : ch;
  span.style.animationDelay = `${.3 + i * .04}s`;
  container.appendChild(span);
});

/* ── Particle canvas ───────────────────────────── */
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let W, H, pts;

const BLURPLE = [88, 101, 242];
const TEAL    = [87, 242, 200];

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
  pts = Array.from({ length: 90 }, () => mkPt());
}

function mkPt() {
  const isBlurple = Math.random() > .35;
  const col = isBlurple ? BLURPLE : TEAL;
  return {
    x:  Math.random() * W,
    y:  Math.random() * H,
    vx: (Math.random() - .5) * .35,
    vy: (Math.random() - .5) * .35,
    r:  Math.random() * 1.8 + .4,
    a:  Math.random(),
    col,
  };
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // connections
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 130) {
        const alpha = (1 - d/130) * .18;
        ctx.beginPath();
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.strokeStyle = `rgba(88,101,242,${alpha})`;
        ctx.lineWidth = .6;
        ctx.stroke();
      }
    }
  }

  // dots
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${p.col.join(',')},${p.a * .8})`;
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    if (p.x < -10) p.x = W + 10;
    if (p.x > W+10) p.x = -10;
    if (p.y < -10) p.y = H + 10;
    if (p.y > H+10) p.y = -10;
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();

/* ── Subtle parallax on mouse ──────────────────── */
document.addEventListener('mousemove', e => {
  const xf = (e.clientX / window.innerWidth  - .5) * 18;
  const yf = (e.clientY / window.innerHeight - .5) * 10;
  document.querySelector('.hero-name').style.transform
    = `translate(${xf*.3}px, ${yf*.3}px)`;
});
</script>
</body>
</html>
